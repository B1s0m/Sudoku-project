<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Rules</title>
    <link rel="stylesheet" href="./css/styleRules.css">
</head>

<body>

   <div class="home-container">
    <h1>📖 Sudoku Rules</h1>

    <ul class="rules">
        <li>Fill every empty cell with a number from <strong>1 to 9</strong>.</li>
        <li>Each row must contain the numbers <strong>1-9</strong> exactly once.</li>
        <li>Each column must contain the numbers <strong>1-9</strong> exactly once.</li>
        <li>Each <strong>3x3</strong> box must contain the numbers <strong>1-9</strong> exactly once.</li>
        <li>The pre-filled numbers <strong>cannot be changed</strong>.</li>
    </ul>

    <button  onclick="location.href='index.html'">
        ⬅ Back
    </button>
</div>

</body>

</html>
